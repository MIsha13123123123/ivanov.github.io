<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CORE TEST — Система заданий</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0a; color: #e5e5e5; min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }

  /* ===== ЭКРАН ВХОДА ===== */
  .login-screen {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh; background: #0a0a0a;
    padding: 16px;
  }
  .login-box {
    background: #1a1a1a; padding: 40px 32px; border-radius: 16px;
    box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); width: 100%; max-width: 380px;
    border: 1px solid #00ff41; position: relative;
  }
  .login-box h1 { 
    text-align: center; margin-bottom: 8px; color: #00ff41; font-weight: 700;
    font-family: 'Courier New', monospace; font-size: 32px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
  }
  .login-box .sub { text-align: center; color: #a3a3a3; margin-bottom: 30px; font-size: 14px; }
  .login-box input {
    width: 100%; padding: 12px 16px; margin-bottom: 15px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
    color: #00ff41; font-size: 15px; font-family: 'Courier New', monospace;
  }
  .login-box input:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.3); }
  .login-box button {
    width: 100%; padding: 13px; background: #00ff41; color: #0a0a0a;
    border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
    font-weight: 700; transition: 0.2s; text-transform: uppercase;
  }
  .login-box button:hover { background: #00cc33; box-shadow: 0 0 20px rgba(0, 255, 65, 0.5); }
  .error { color: #ff4444; text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
  .hint {
    margin-top: 20px; padding: 12px; background: #0a0a0a;
    border-radius: 8px; font-size: 12px; color: #a3a3a3; line-height: 1.6;
    border: 1px solid #333;
  }
  .hint code { color: #00ff41; background: #1a1a1a; padding: 2px 6px; border-radius: 3px; word-break: break-all; }

  /* Кнопка перевода на экране логина — в правом верхнем углу экрана */
  .login-lang-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 50;
    background: #3b82f6; color: #fff; border: none;
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
    font-weight: 700; font-size: 13px; transition: 0.2s;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
  }
  .login-lang-toggle:hover { background: #2563eb; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
  .login-lang-toggle.translating { background: #6b7280; cursor: wait; }

  /* ===== ГЛАВНЫЙ ЭКРАН ===== */
  .app { display: none; }
  .app.active { display: block; }
  header {
    background: #1a1a1a; padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 8px rgba(0, 255, 65, 0.1);
    border-bottom: 2px solid #00ff41;
  }
  header h2 { 
    color: #00ff41; font-weight: 700; font-family: 'Courier New', monospace;
    font-size: 24px; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
  }
  .header-controls { display: flex; align-items: center; gap: 15px; }
  .user-info { display: flex; align-items: center; gap: 12px; }
  .user-info span { color: #a3a3a3; }
  
  .lang-toggle {
    background: #3b82f6; color: #fff; border: none; padding: 10px 18px;
    border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;
    transition: 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .lang-toggle:hover { 
    background: #2563eb; 
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    transform: translateY(-2px);
  }
  .lang-toggle.translating { background: #6b7280; cursor: wait; }
  .lang-toggle .flag { font-size: 16px; }
  
  .btn-logout {
    background: #ff4444; color: #fff; border: none; padding: 10px 18px;
    border-radius: 6px; cursor: pointer; font-weight: 600;
  }
  .btn-logout:hover { background: #cc0000; }

  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* ===== АДМИН-ПАНЕЛЬ ===== */
  .admin-panel {
    background: #1a1a1a; padding: 24px; border-radius: 12px;
    margin-bottom: 32px; border: 2px solid #f59e0b;
  }
  .admin-panel h3 { color: #fbbf24; margin-bottom: 16px; }
  .admin-panel input, .admin-panel textarea, .admin-panel select {
    width: 100%; padding: 10px 14px; margin-bottom: 12px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 6px;
    color: #e5e5e5; font-size: 14px; font-family: inherit;
  }
  .admin-panel input:focus, .admin-panel textarea:focus, .admin-panel select:focus {
    outline: none; border-color: #00ff41;
  }
  .admin-panel textarea { min-height: 100px; resize: vertical; }
  .admin-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .btn-publish {
    background: #00ff41; color: #0a0a0a; border: none; padding: 12px 24px;
    border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 15px;
    text-transform: uppercase; width: 100%;
  }
  .btn-publish:hover { background: #00cc33; box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }

  /* ===== КАЛЕНДАРЬ — ЯРКИЙ БЕЛЫЙ ===== */
  input[type="date"] {
    background: #ffffff !important;
    color: #0a0a0a !important;
    border: 2px solid #00ff41 !important;
    font-weight: 600;
    color-scheme: light;
  }
  input[type="date"]:focus {
    border-color: #00ff41 !important;
    box-shadow: 0 0 12px rgba(0, 255, 65, 0.6) !important;
    background: #ffffff !important;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.3) sepia(1) saturate(10) hue-rotate(100deg);
    cursor: pointer;
    opacity: 1;
  }
  input[type="date"]::-webkit-datetime-edit {
    color: #0a0a0a !important;
    font-weight: 600;
  }

  /* ===== ДОСКА ===== */
  .board-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .board-header h3 { font-size: 22px; color: #00ff41; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-btn {
    background: #1a1a1a; color: #e5e5e5; border: 1px solid #333;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: 0.2s;
  }
  .filter-btn:hover { border-color: #00ff41; }
  .filter-btn.active { background: #00ff41; color: #0a0a0a; border-color: #00ff41; font-weight: 600; }

  .board {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .task-card {
    background: #1a1a1a; border-radius: 12px; padding: 20px;
    cursor: pointer; transition: 0.2s; border-left: 5px solid #333;
    position: relative;
  }
  .task-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 255, 65, 0.15); }
  .task-card:active { transform: scale(0.98); }
  .task-card.important { border-left-color: #ef4444; background: #2a1a1a; }
  .task-card.standard  { border-left-color: #00ff41; }
  .task-card.frozen    { border-left-color: #06b6d4; background: #1a2a2a; }
  .task-card.closed    { opacity: 0.5; border-left-color: #444; }

  .task-badge {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    margin-bottom: 10px; margin-right: 4px;
  }
  .badge-important { background: #ef4444; color: #fff; }
  .badge-standard  { background: #00ff41; color: #0a0a0a; }
  .badge-frozen    { background: #06b6d4; color: #fff; }
  .badge-closed    { background: #444; color: #d1d5db; }

  .task-card h4 { margin-bottom: 10px; font-size: 17px; color: #fff; word-break: break-word; }
  .task-card .preview { color: #a3a3a3; font-size: 13px; margin-bottom: 12px; line-height: 1.5; word-break: break-word; }
  .task-card .dates {
    display: flex; justify-content: space-between; font-size: 12px;
    color: #a3a3a3; padding-top: 10px; border-top: 1px solid #333;
    gap: 10px; flex-wrap: wrap;
  }
  .task-card .dates .expired { color: #ff4444; }
  .task-card .dates .active  { color: #00ff41; }
  .task-card .dates .frozen  { color: #22d3ee; }

  .lang-indicator {
    position: absolute; top: 10px; right: 10px; font-size: 11px;
    color: #3b82f6; font-weight: 600; background: rgba(59, 130, 246, 0.1);
    padding: 2px 6px; border-radius: 4px;
  }

  .delete-btn-card {
    position: absolute; bottom: 10px; right: 10px;
    background: #ef4444; color: #fff; border: none;
    width: 36px; height: 36px; border-radius: 6px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s; opacity: 0.8;
  }
  .delete-btn-card:hover { background: #dc2626; opacity: 1; transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

  /* ===== МОДАЛКА ===== */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a1a; border-radius: 12px; padding: 32px;
    max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
    position: relative; border: 1px solid #00ff41;
  }
  .modal-close {
    position: absolute; top: 15px; right: 20px; background: none;
    border: none; color: #a3a3a3; font-size: 28px; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: #00ff41; }
  .modal h3 { margin-bottom: 16px; font-size: 24px; padding-right: 40px; color: #00ff41; word-break: break-word; }
  .modal .meta { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .modal .content {
    background: #0a0a0a; padding: 20px; border-radius: 8px;
    line-height: 1.7; white-space: pre-wrap; word-wrap: break-word;
    border: 1px solid #333; color: #e5e5e5;
  }
  .modal .dates-full {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid #333;
    font-size: 14px; color: #a3a3a3; line-height: 1.8;
  }

  .admin-actions {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid #333;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .admin-actions button {
    padding: 10px 18px; border: none; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s;
    flex: 1 1 auto; min-width: 120px;
  }
  .btn-freeze   { background: #06b6d4; color: #fff; }
  .btn-freeze:hover { background: #0891b2; box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }
  .btn-unfreeze { background: #8b5cf6; color: #fff; }
  .btn-unfreeze:hover { background: #7c3aed; box-shadow: 0 0 10px rgba(139, 92, 246, 0.4); }
  .btn-close-task { background: #ef4444; color: #fff; }
  .btn-close-task:hover { background: #dc2626; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
  .btn-reopen   { background: #00ff41; color: #0a0a0a; }
  .btn-reopen:hover { background: #00cc33; box-shadow: 0 0 10px rgba(0, 255, 65, 0.4); }
  .btn-delete   { background: #dc2626; color: #fff; }
  .btn-delete:hover { background: #b91c1c; box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }

  .empty {
    text-align: center; padding: 60px 20px; color: #666;
    grid-column: 1 / -1;
  }
  .empty h4 { font-size: 20px; margin-bottom: 8px; color: #00ff41; }

  /* ===== МОБИЛЬНАЯ АДАПТАЦИЯ ===== */
  @media (max-width: 768px) {
    header { padding: 12px 16px; flex-direction: column; gap: 12px; }
    header h2 { font-size: 20px; }
    .header-controls { width: 100%; justify-content: space-between; }
    .user-info { flex: 1; justify-content: flex-end; }
    .user-info span { font-size: 13px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    main { padding: 16px; }
    
    .admin-panel { padding: 16px; margin-bottom: 20px; }
    .admin-panel h3 { font-size: 16px; }
    .admin-row { grid-template-columns: 1fr; gap: 8px; }
    .admin-panel input, .admin-panel textarea, .admin-panel select { font-size: 16px; }
    
    .board-header { margin-bottom: 16px; }
    .board-header h3 { font-size: 18px; width: 100%; }
    .filters { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
    .filter-btn { flex-shrink: 0; padding: 8px 14px; font-size: 13px; }
    
    .board { grid-template-columns: 1fr; gap: 12px; }
    .task-card { padding: 16px; }
    .task-card h4 { font-size: 16px; }
    .task-card .preview { font-size: 13px; }
    
    .modal { padding: 20px; max-height: 90vh; margin: 10px; }
    .modal h3 { font-size: 20px; padding-right: 30px; }
    .modal-close { top: 10px; right: 10px; font-size: 24px; }
    .modal .content { padding: 14px; font-size: 14px; }
    .modal .dates-full { font-size: 13px; }
    
    .admin-actions button { padding: 10px 12px; font-size: 13px; min-width: 0; }
    
    .login-box { padding: 30px 20px; }
    .login-box h1 { font-size: 26px; }
    .login-box .sub { font-size: 13px; margin-bottom: 20px; }
    .login-box input { font-size: 16px; padding: 12px 14px; }
    .hint { font-size: 11px; }
  }

  @media (max-width: 400px) {
    .login-box h1 { font-size: 22px; letter-spacing: 1px; }
    .header-controls { gap: 8px; }
    .lang-toggle { padding: 8px 12px; font-size: 13px; }
    .btn-logout { padding: 8px 12px; font-size: 13px; }
    .user-info span { max-width: 100px; font-size: 12px; }
  }

  /* Отключаем hover-эффекты на touch-устройствах */
  @media (hover: none) {
    .task-card:hover { transform: none; box-shadow: none; }
    .lang-toggle:hover { transform: none; }
  }

  /* Учёт safe-area для iPhone с чёлкой */
  @supports (padding: env(safe-area-inset-top)) {
    header { padding-top: calc(16px + env(safe-area-inset-top)); }
    .login-screen { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  }
</style>
</head>
<body>

<!-- Кнопка перевода на экране логина — в правом верхнем углу экрана -->
<button class="login-lang-toggle" id="loginLangToggle" onclick="toggleAllTranslation()" style="display:none;">
  <span class="flag">🇷🇺</span><span id="loginLangText">RU</span>
</button>

<!-- ===== ЭКРАН ВХОДА ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>CORE TEST</h1>
    <p class="sub" id="loginSub">Система заданий для тестировщиков</p>
    <input type="text" id="loginUser" placeholder="Логин" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Пароль">
    <button onclick="doLogin()" id="loginBtn">Войти</button>
    <div class="error" id="loginError"></div>
    <div class="hint" id="loginHint">
      <b id="hintTitle">Тестовые аккаунты:</b><br>
      👑 <span id="hintAdminLabel">Админ</span>: <code>admin</code> / <code>admin123</code><br>
      👤 <span id="hintTesterLabel">Тестер</span>: <code>tester1</code> / <code>test123</code><br>
      👤 <span id="hintTesterLabel2">Тестер</span>: <code>tester2</code> / <code>test456</code>
    </div>
  </div>
</div>

<!-- ===== ГЛАВНОЕ ПРИЛОЖЕНИЕ ===== -->
<div class="app" id="app">
  <header>
    <h2>CORE TEST</h2>
    <div class="header-controls">
      <button class="lang-toggle" id="langToggle" onclick="toggleAllTranslation()">
        <span class="flag">🇷🇺</span>
        <span id="langText">RU</span>
      </button>
      <div class="user-info">
        <span id="userLabel"></span>
        <button class="btn-logout" id="logoutBtn" onclick="doLogout()">Выйти</button>
      </div>
    </div>
  </header>

  <main>
    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h3 id="adminPanelTitle">⚙️ Панель администратора — создать задание</h3>
      <input type="text" id="taskTitle" placeholder="Заголовок задания">
      <textarea id="taskBody" placeholder="Текст задания (скопируйте сюда)..."></textarea>
      <div class="admin-row">
        <select id="taskPriority">
          <option value="standard">📘 Стандарт</option>
          <option value="important">🔥 Важное</option>
        </select>
        <input type="date" id="taskStart">
        <input type="date" id="taskEnd">
      </div>
      <button class="btn-publish" id="publishBtn" onclick="publishTask()">📢 Опубликовать на доску</button>
    </div>

    <div class="board-header">
      <h3 id="boardTitle">📋 Доска заданий</h3>
      <div class="filters" id="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
        <button class="filter-btn" onclick="setFilter('important', this)">🔥 Важные</button>
        <button class="filter-btn" onclick="setFilter('active', this)">✅ Активные</button>
        <button class="filter-btn" onclick="setFilter('frozen', this)">❄️ Замороженные</button>
        <button class="filter-btn" onclick="setFilter('closed', this)">🔒 Закрытые</button>
      </div>
    </div>
    <div class="board" id="board"></div>
  </main>
</div>

<!-- ===== МОДАЛКА ===== -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3 id="modalTitle"></h3>
    <div class="meta" id="modalMeta"></div>
    <div class="content" id="modalContent"></div>
    <div class="dates-full" id="modalDates"></div>
    <div class="admin-actions" id="adminActions" style="display:none;"></div>
  </div>
</div>

<script>
// ===== СЛОВАРЬ ПЕРЕВОДОВ =====
const i18n = {
  ru: {
    loginSub: 'Система заданий для тестировщиков',
    loginUser: 'Логин', loginPass: 'Пароль', loginBtn: 'Войти',
    hintTitle: 'Тестовые аккаунты:', hintAdminLabel: 'Админ', hintTesterLabel: 'Тестер',
    loginError: '❌ Неверный логин или пароль', logoutBtn: 'Выйти',
    adminPanelTitle: '⚙️ Панель администратора — создать задание',
    taskTitlePh: 'Заголовок задания', taskBodyPh: 'Текст задания (скопируйте сюда)...',
    optStandard: '📘 Стандарт', optImportant: '🔥 Важное',
    publishBtn: '📢 Опубликовать на доску', boardTitle: '📋 Доска заданий',
    filterAll: 'Все', filterImportant: '🔥 Важные', filterActive: '✅ Активные',
    filterFrozen: '❄️ Замороженные', filterClosed: '🔒 Закрытые',
    emptyTitle: '📭 Заданий нет', emptyText: 'Пока здесь пусто.',
    alertFillAll: '⚠️ Заполни все поля!', alertDateWrong: '⚠️ Дата окончания раньше начала!',
    alertPublished: '✅ Задание опубликовано!',
    confirmDelete: 'Удалить задачу? Это действие нельзя отменить.',
    confirmClose: 'Закрыть задачу?',
    alertTranslateError: '⚠️ Ошибка перевода. Проверьте интернет.',
    badgeClosed: '🔒 Закрыто', badgeFrozen: '❄️ Заморожено',
    badgeImportant: '🔥 Важное', badgeStandard: '📘 Стандарт',
    statusClosed: 'Закрыто', statusFrozen: 'На паузе', statusFuture: 'Ещё не начато', statusActive: 'Активно',
    modalStatusClosed: '❌ Закрыто', modalStatusFrozen: '❄️ Заморожено (срок на паузе)',
    modalStatusFuture: '⏳ Ещё не началось', modalStatusActive: '✅ Активно',
    period: 'Период', statusLabel: 'Статус', createdBy: 'Создал',
    btnUnfreeze: '🔓 Разморозить', btnClose: '🔒 Закрыть', btnReopen: '🔓 Переоткрыть',
    btnFreeze: '❄️ Заморозить', btnDelete: '🗑️ Удалить', titleDelete: 'Удалить'
  },
  en: {
    loginSub: 'Task system for testers',
    loginUser: 'Login', loginPass: 'Password', loginBtn: 'Sign in',
    hintTitle: 'Test accounts:', hintAdminLabel: 'Admin', hintTesterLabel: 'Tester',
    loginError: '❌ Invalid login or password', logoutBtn: 'Logout',
    adminPanelTitle: '⚙️ Administrator panel — create task',
    taskTitlePh: 'Task title', taskBodyPh: 'Task text (paste here)...',
    optStandard: '📘 Standard', optImportant: '🔥 Important',
    publishBtn: '📢 Publish to board', boardTitle: '📋 Task board',
    filterAll: 'All', filterImportant: '🔥 Important', filterActive: '✅ Active',
    filterFrozen: '❄️ Frozen', filterClosed: '🔒 Closed',
    emptyTitle: '📭 No tasks', emptyText: 'Board is empty for now.',
    alertFillAll: '⚠️ Please fill all fields!', alertDateWrong: '⚠️ End date is before start date!',
    alertPublished: '✅ Task published!',
    confirmDelete: 'Delete this task? This cannot be undone.',
    confirmClose: 'Close this task?',
    alertTranslateError: '⚠️ Translation error. Check your internet.',
    badgeClosed: '🔒 Closed', badgeFrozen: '❄️ Frozen',
    badgeImportant: '🔥 Important', badgeStandard: '📘 Standard',
    statusClosed: 'Closed', statusFrozen: 'On Hold', statusFuture: 'Not Started', statusActive: 'Active',
    modalStatusClosed: '❌ Closed', modalStatusFrozen: '❄️ Frozen (deadline paused)',
    modalStatusFuture: '⏳ Not started yet', modalStatusActive: '✅ Active',
    period: 'Period', statusLabel: 'Status', createdBy: 'Created by',
    btnUnfreeze: '🔓 Unfreeze', btnClose: '🔒 Close', btnReopen: '🔓 Reopen',
    btnFreeze: '❄️ Freeze', btnDelete: '🗑️ Delete', titleDelete: 'Delete'
  }
};

function t(key) { return i18n[globalLang][key] || key; }

function applyLanguage() {
  document.getElementById('loginSub').textContent = t('loginSub');
  document.getElementById('loginUser').placeholder = t('loginUser');
  document.getElementById('loginPass').placeholder = t('loginPass');
  document.getElementById('loginBtn').textContent = t('loginBtn');
  document.getElementById('hintTitle').textContent = t('hintTitle');
  document.getElementById('hintAdminLabel').textContent = t('hintAdminLabel');
  document.getElementById('hintTesterLabel').textContent = t('hintTesterLabel');
  document.getElementById('hintTesterLabel2').textContent = t('hintTesterLabel');
  document.getElementById('logoutBtn').textContent = t('logoutBtn');
  document.getElementById('adminPanelTitle').textContent = t('adminPanelTitle');
  document.getElementById('taskTitle').placeholder = t('taskTitlePh');
  document.getElementById('taskBody').placeholder = t('taskBodyPh');
  const opts = document.getElementById('taskPriority').options;
  opts[0].textContent = t('optStandard');
  opts[1].textContent = t('optImportant');
  document.getElementById('publishBtn').textContent = t('publishBtn');
  document.getElementById('boardTitle').textContent = t('boardTitle');
  const filterBtns = document.querySelectorAll('#filters .filter-btn');
  const filterKeys = ['filterAll', 'filterImportant', 'filterActive', 'filterFrozen', 'filterClosed'];
  filterBtns.forEach((btn, i) => btn.textContent = t(filterKeys[i]));
}

// ===== БАЗА ДАННЫХ =====
const DB = {
  getUsers() {
    if (!localStorage.getItem('users')) {
      localStorage.setItem('users', JSON.stringify({
        admin:   { pass: 'admin123', role: 'admin',  name: { ru: 'Администратор', en: 'Administrator' } },
        tester1: { pass: 'test123',  role: 'tester', name: { ru: 'Тестер #1', en: 'Tester #1' } },
        tester2: { pass: 'test456',  role: 'tester', name: { ru: 'Тестер #2', en: 'Tester #2' } }
      }));
    }
    return JSON.parse(localStorage.getItem('users'));
  },
  getTasks() {
    if (!localStorage.getItem('tasks')) {
      // Пустая доска при первом заходе — никаких демо-задач
      localStorage.setItem('tasks', JSON.stringify([]));
    }
    return JSON.parse(localStorage.getItem('tasks'));
  },
  saveTasks(t) { localStorage.setItem('tasks', JSON.stringify(t)); }
};

// ===== СОСТОЯНИЕ =====
let currentUser = null;
let currentFilter = 'all';
let currentTaskId = null;
let globalLang = 'ru';

// ===== API ПЕРЕВОДА =====
async function translateText(text, from = 'ru', to = 'en') {
  try {
    const response = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`
    );
    const data = await response.json();
    if (data.responseStatus === 200 && data.responseData?.translatedText) {
      return data.responseData.translatedText;
    }
    return text;
  } catch (error) {
    console.error('Ошибка перевода:', error);
    throw error;
  }
}

// ===== ГЛОБАЛЬНЫЙ ПЕРЕВОД =====
async function toggleAllTranslation() {
  const loginBtn = document.getElementById('loginLangToggle');
  const appBtn = document.getElementById('langToggle');
  
  if (globalLang === 'en') {
    globalLang = 'ru';
    loginBtn.innerHTML = '<span class="flag">🇷🇺</span><span id="loginLangText">RU</span>';
    appBtn.innerHTML = '<span class="flag">🇷🇺</span><span id="langText">RU</span>';
    loginBtn.classList.remove('translating');
    appBtn.classList.remove('translating');
    applyLanguage();
    updateUserName();
    renderBoard();
    if (currentTaskId) openTask(currentTaskId);
    return;
  }

  loginBtn.classList.add('translating');
  loginBtn.innerHTML = '<span class="flag">⏳</span><span>Loading...</span>';
  appBtn.classList.add('translating');
  appBtn.innerHTML = '<span class="flag">⏳</span><span>Loading...</span>';
  
  const tasks = DB.getTasks();
  let translatedCount = 0;

  try {
    for (const task of tasks) {
      if (!task.translatedTitle || !task.translatedBody) {
        try {
          const [transTitle, transBody] = await Promise.all([
            translateText(task.title, 'ru', 'en'),
            translateText(task.body, 'ru', 'en')
          ]);
          task.translatedTitle = transTitle;
          task.translatedBody = transBody;
          translatedCount++;
        } catch (e) {
          console.error(`Не удалось перевести задачу ${task.id}:`, e);
        }
      }
    }

    DB.saveTasks(tasks);
    globalLang = 'en';
    
    loginBtn.innerHTML = '<span class="flag">🇬🇧</span><span id="loginLangText">EN</span>';
    appBtn.innerHTML = '<span class="flag">🇬🇧</span><span id="langText">EN</span>';
    loginBtn.classList.remove('translating');
    appBtn.classList.remove('translating');
    
    applyLanguage();
    updateUserName();
    renderBoard();
    if (currentTaskId) openTask(currentTaskId);
    
    if (translatedCount > 0) console.log(`Переведено задач: ${translatedCount}`);
  } catch (e) {
    console.error('Ошибка при массовом переводе:', e);
    loginBtn.innerHTML = '<span class="flag">🇷🇺</span><span id="loginLangText">RU</span>';
    appBtn.innerHTML = '<span class="flag">🇷🇺</span><span id="langText">RU</span>';
    loginBtn.classList.remove('translating');
    appBtn.classList.remove('translating');
    alert(t('alertTranslateError'));
  }
}

function updateUserName() {
  if (!currentUser) return;
  const users = DB.getUsers();
  const user = users[currentUser.username];
  const name = typeof user.name === 'object' ? user.name[globalLang] : user.name;
  document.getElementById('userLabel').textContent =
    (currentUser.role === 'admin' ? '👑 ' : '👤 ') + name;
}

// ===== УДАЛЕНИЕ =====
function deleteTask(id) {
  if (!confirm(t('confirmDelete'))) return;
  const tasks = DB.getTasks().filter(x => x.id !== id);
  DB.saveTasks(tasks);
  closeModal();
  renderBoard();
}

// ===== АВТОРИЗАЦИЯ =====
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const users = DB.getUsers();

  if (!users[u] || users[u].pass !== p) {
    err.textContent = t('loginError');
    return;
  }
  currentUser = { username: u, ...users[u] };
  sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
  err.textContent = '';
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('currentUser');
  currentUser = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
  // Показываем кнопку RU/EN снова на экране логина
  document.getElementById('loginLangToggle').style.display = 'flex';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  // Скрываем кнопку RU/EN экрана логина
  document.getElementById('loginLangToggle').style.display = 'none';
  updateUserName();

  document.getElementById('adminPanel').style.display =
    currentUser.role === 'admin' ? 'block' : 'none';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('taskStart').value = today;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('taskEnd').value = tomorrow.toISOString().split('T')[0];

  applyLanguage();
  renderBoard();
}

// ===== ПУБЛИКАЦИЯ =====
function publishTask() {
  if (currentUser.role !== 'admin') return;
  const title = document.getElementById('taskTitle').value.trim();
  const body  = document.getElementById('taskBody').value.trim();
  const priority = document.getElementById('taskPriority').value;
  const start = document.getElementById('taskStart').value;
  const end   = document.getElementById('taskEnd').value;

  if (!title || !body || !start || !end) { alert(t('alertFillAll')); return; }
  if (end < start) { alert(t('alertDateWrong')); return; }

  const tasks = DB.getTasks();
  tasks.push({
    id: Date.now(), title, body, priority, start, end,
    author: currentUser.username, created: Date.now(),
    frozen: false, manuallyClosed: false,
    translatedTitle: '', translatedBody: ''
  });
  DB.saveTasks(tasks);

  document.getElementById('taskTitle').value = '';
  document.getElementById('taskBody').value = '';
  alert(t('alertPublished'));
  renderBoard();
}

// ===== СТАТУС =====
function getTaskStatus(task) {
  if (task.frozen) return 'frozen';
  if (task.manuallyClosed) return 'closed';
  const today = new Date().toISOString().split('T')[0];
  if (today < task.start) return 'future';
  if (today > task.end)   return 'closed';
  return 'active';
}

// ===== ФИЛЬТРЫ =====
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBoard();
}

// ===== РЕНДЕР ДОСКИ =====
function renderBoard() {
  const board = document.getElementById('board');
  let tasks = DB.getTasks().map(x => ({ ...x, status: getTaskStatus(x) }));

  if (currentFilter === 'important') tasks = tasks.filter(x => x.priority === 'important' && x.status !== 'closed');
  if (currentFilter === 'active')    tasks = tasks.filter(x => x.status === 'active' || x.status === 'future');
  if (currentFilter === 'frozen')    tasks = tasks.filter(x => x.status === 'frozen');
  if (currentFilter === 'closed')    tasks = tasks.filter(x => x.status === 'closed');

  tasks.sort((a, b) => {
    const order = { active: 0, future: 1, frozen: 2, closed: 3 };
    const priOrder = { important: 0, standard: 1 };
    const sa = order[a.status], sb = order[b.status];
    if (sa !== sb) return sa - sb;
    if (priOrder[a.priority] !== priOrder[b.priority])
      return priOrder[a.priority] - priOrder[b.priority];
    return b.created - a.created;
  });

  if (tasks.length === 0) {
    board.innerHTML = `<div class="empty"><h4>${t('emptyTitle')}</h4><p>${t('emptyText')}</p></div>`;
    return;
  }

  board.innerHTML = tasks.map(x => {
    const cardClass = x.status === 'frozen' ? 'frozen'
                    : x.status === 'closed' ? 'closed'
                    : x.priority;

    const title = (globalLang === 'en' && x.translatedTitle) ? x.translatedTitle : x.title;
    const preview = (globalLang === 'en' && x.translatedBody) 
      ? x.translatedBody.substring(0, 100) + (x.translatedBody.length > 100 ? '...' : '')
      : x.body.substring(0, 100) + (x.body.length > 100 ? '...' : '');

    let badges = '';
    if (x.status === 'frozen')       badges += `<span class="task-badge badge-frozen">${t('badgeFrozen')}</span>`;
    else if (x.status === 'closed')  badges += `<span class="task-badge badge-closed">${t('badgeClosed')}</span>`;
    if (x.priority === 'important' && x.status !== 'closed')
      badges += `<span class="task-badge badge-important">${t('badgeImportant')}</span>`;
    else if (x.status !== 'frozen' && x.status !== 'closed')
      badges += `<span class="task-badge badge-standard">${t('badgeStandard')}</span>`;

    const statusClass = x.status === 'closed' ? 'expired'
                      : x.status === 'frozen' ? 'frozen'
                      : 'active';
    
    const statusKey = x.status === 'closed' ? 'statusClosed'
                    : x.status === 'frozen' ? 'statusFrozen'
                    : x.status === 'future' ? 'statusFuture'
                    : 'statusActive';

    const langIndicator = globalLang === 'en' && x.translatedTitle 
      ? '<span class="lang-indicator">🇬🇧 EN</span>' 
      : '';

    const deleteBtn = (currentUser && currentUser.role === 'admin' && x.status === 'closed')
      ? `<button class="delete-btn-card" onclick="event.stopPropagation(); deleteTask(${x.id})" title="${t('titleDelete')}">🗑️</button>`
      : '';

    return `
      <div class="task-card ${cardClass}" onclick="openTask(${x.id})">
        ${langIndicator}
        ${badges}
        <h4>${escapeHtml(title)}</h4>
        <div class="preview">${escapeHtml(preview)}</div>
        <div class="dates">
          <span>📅 ${x.start} → ${x.end}</span>
          <span class="${statusClass}">${t(statusKey)}</span>
        </div>
        ${deleteBtn}
      </div>
    `;
  }).join('');
}

// ===== МОДАЛКА =====
function openTask(id) {
  currentTaskId = id;
  
  const x = DB.getTasks().find(y => y.id === id);
  if (!x) return;
  const status = getTaskStatus(x);

  const title = (globalLang === 'en' && x.translatedTitle) ? x.translatedTitle : x.title;
  const content = (globalLang === 'en' && x.translatedBody) ? x.translatedBody : x.body;

  document.getElementById('modalTitle').textContent = title;

  let badges = '';
  if (status === 'frozen')       badges += `<span class="task-badge badge-frozen">${t('badgeFrozen')}</span>`;
  else if (status === 'closed')  badges += `<span class="task-badge badge-closed">${t('badgeClosed')}</span>`;
  if (x.priority === 'important' && status !== 'closed')
    badges += `<span class="task-badge badge-important">${t('badgeImportant')}</span>`;
  else if (status !== 'frozen' && status !== 'closed')
    badges += `<span class="task-badge badge-standard">${t('badgeStandard')}</span>`;
  document.getElementById('modalMeta').innerHTML = badges;

  document.getElementById('modalContent').textContent = content;

  const statusKey = status === 'closed' ? 'modalStatusClosed'
                  : status === 'frozen' ? 'modalStatusFrozen'
                  : status === 'future' ? 'modalStatusFuture'
                  : 'modalStatusActive';

  document.getElementById('modalDates').innerHTML =
    `<b>${t('period')}:</b> ${x.start} → ${x.end}<br>
     <b>${t('statusLabel')}:</b> ${t(statusKey)}<br>
     <b>${t('createdBy')}:</b> ${x.author}`;

  const actions = document.getElementById('adminActions');
  if (currentUser && currentUser.role === 'admin') {
    let btns = '';
    if (status === 'frozen') {
      btns += `<button class="btn-unfreeze" onclick="toggleFreeze(${x.id})">${t('btnUnfreeze')}</button>`;
      btns += `<button class="btn-close-task" onclick="manualClose(${x.id})">${t('btnClose')}</button>`;
    } else if (status === 'closed') {
      btns += `<button class="btn-reopen" onclick="reopenTask(${x.id})">${t('btnReopen')}</button>`;
      btns += `<button class="btn-freeze" onclick="toggleFreeze(${x.id})">${t('btnFreeze')}</button>`;
      btns += `<button class="btn-delete" onclick="deleteTask(${x.id})">${t('btnDelete')}</button>`;
    } else {
      btns += `<button class="btn-freeze" onclick="toggleFreeze(${x.id})">${t('btnFreeze')}</button>`;
      btns += `<button class="btn-close-task" onclick="manualClose(${x.id})">${t('btnClose')}</button>`;
    }
    actions.innerHTML = btns;
    actions.style.display = 'flex';
  } else {
    actions.style.display = 'none';
  }

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentTaskId = null;
}

// ===== ДЕЙСТВИЯ АДМИНА =====
function toggleFreeze(id) {
  const tasks = DB.getTasks();
  const x = tasks.find(y => y.id === id);
  if (!x) return;
  x.frozen = !x.frozen;
  if (x.frozen) x.manuallyClosed = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

function manualClose(id) {
  if (!confirm(t('confirmClose'))) return;
  const tasks = DB.getTasks();
  const x = tasks.find(y => y.id === id);
  if (!x) return;
  x.manuallyClosed = true;
  x.frozen = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

function reopenTask(id) {
  const tasks = DB.getTasks();
  const x = tasks.find(y => y.id === id);
  if (!x) return;
  x.manuallyClosed = false;
  x.frozen = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

// ===== УТИЛИТЫ =====
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('loginPass').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});

applyLanguage();

// Показываем кнопку RU/EN на экране логина при старте
document.getElementById('loginLangToggle').style.display = 'flex';

const saved = sessionStorage.getItem('currentUser');
if (saved) { currentUser = JSON.parse(saved); showApp(); }

setInterval(() => { if (currentUser) renderBoard(); }, 60000);
</script>
