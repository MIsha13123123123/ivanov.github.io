<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CORE TEST — Система заданий</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }

  /* ===== ЭКРАН ВХОДА ===== */
  .login-screen {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #0a0a0a;
  }
  .login-box {
    background: #1a1a1a; padding: 40px; border-radius: 16px;
    box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); width: 380px;
    border: 1px solid #00ff41;
  }
  .login-box h1 { 
    text-align: center; margin-bottom: 8px; color: #00ff41; font-weight: 700;
    font-family: 'Courier New', monospace; font-size: 32px; letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
  }
  .login-box .sub { text-align: center; color: #a3a3a3; margin-bottom: 30px; font-size: 14px; }
  .login-box input {
    width: 100%; padding: 12px 16px; margin-bottom: 15px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 8px;
    color: #00ff41; font-size: 15px; font-family: 'Courier New', monospace;
  }
  .login-box input:focus { outline: none; border-color: #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.3); }
  .login-box button {
    width: 100%; padding: 13px; background: #00ff41; color: #0a0a0a;
    border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
    font-weight: 700; transition: 0.2s; text-transform: uppercase;
  }
  .login-box button:hover { background: #00cc33; box-shadow: 0 0 20px rgba(0, 255, 65, 0.5); }
  .error { color: #ff4444; text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
  .hint {
    margin-top: 20px; padding: 12px; background: #0a0a0a;
    border-radius: 8px; font-size: 12px; color: #a3a3a3; line-height: 1.6;
    border: 1px solid #333;
  }
  .hint code { color: #00ff41; background: #1a1a1a; padding: 2px 6px; border-radius: 3px; }

  /* ===== ГЛАВНЫЙ ЭКРАН ===== */
  .app { display: none; }
  .app.active { display: block; }
  header {
    background: #1a1a1a; padding: 16px 32px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 8px rgba(0, 255, 65, 0.1);
    border-bottom: 2px solid #00ff41;
  }
  header h2 { 
    color: #00ff41; font-weight: 700; font-family: 'Courier New', monospace;
    font-size: 24px; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
  }
  .header-controls { display: flex; align-items: center; gap: 20px; }
  .user-info { display: flex; align-items: center; gap: 15px; }
  .user-info span { color: #a3a3a3; }
  
  /* Кнопка перевода */
  .lang-toggle {
    background: #3b82f6; color: #fff; border: none; padding: 10px 20px;
    border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;
    transition: 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .lang-toggle:hover { 
    background: #2563eb; 
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    transform: translateY(-2px);
  }
  .lang-toggle.translating {
    background: #6b7280;
    cursor: wait;
  }
  .lang-toggle .flag { font-size: 16px; }
  
  .btn-logout {
    background: #ff4444; color: #fff; border: none; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; font-weight: 600;
  }
  .btn-logout:hover { background: #cc0000; }

  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* ===== АДМИН-ПАНЕЛЬ ===== */
  .admin-panel {
    background: #1a1a1a; padding: 24px; border-radius: 12px;
    margin-bottom: 32px; border: 2px solid #f59e0b;
  }
  .admin-panel h3 { color: #fbbf24; margin-bottom: 16px; }
  .admin-panel input, .admin-panel textarea, .admin-panel select {
    width: 100%; padding: 10px 14px; margin-bottom: 12px;
    background: #0a0a0a; border: 1px solid #333; border-radius: 6px;
    color: #e5e5e5; font-size: 14px; font-family: inherit;
  }
  .admin-panel input:focus, .admin-panel textarea:focus, .admin-panel select:focus {
    outline: none; border-color: #00ff41;
  }
  .admin-panel textarea { min-height: 100px; resize: vertical; }
  .admin-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .btn-publish {
    background: #00ff41; color: #0a0a0a; border: none; padding: 12px 24px;
    border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 15px;
    text-transform: uppercase;
  }
  .btn-publish:hover { background: #00cc33; box-shadow: 0 0 15px rgba(0, 255, 65, 0.4); }

  /* ===== ДОСКА ===== */
  .board-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .board-header h3 { font-size: 22px; color: #00ff41; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-btn {
    background: #1a1a1a; color: #e5e5e5; border: 1px solid #333;
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px;
    transition: 0.2s;
  }
  .filter-btn:hover { border-color: #00ff41; }
  .filter-btn.active { background: #00ff41; color: #0a0a0a; border-color: #00ff41; font-weight: 600; }

  .board {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .task-card {
    background: #1a1a1a; border-radius: 12px; padding: 20px;
    cursor: pointer; transition: 0.2s; border-left: 5px solid #333;
    position: relative;
  }
  .task-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0, 255, 65, 0.15); }
  .task-card.important { border-left-color: #ef4444; background: #2a1a1a; }
  .task-card.standard  { border-left-color: #00ff41; }
  .task-card.frozen    { border-left-color: #06b6d4; background: #1a2a2a; }
  .task-card.closed    { opacity: 0.5; border-left-color: #444; }

  .task-badge {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    margin-bottom: 10px; margin-right: 4px;
  }
  .badge-important { background: #ef4444; color: #fff; }
  .badge-standard  { background: #00ff41; color: #0a0a0a; }
  .badge-frozen    { background: #06b6d4; color: #fff; }
  .badge-closed    { background: #444; color: #d1d5db; }

  .task-card h4 { margin-bottom: 10px; font-size: 17px; color: #fff; }
  .task-card .preview { color: #a3a3a3; font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
  .task-card .dates {
    display: flex; justify-content: space-between; font-size: 12px;
    color: #a3a3a3; padding-top: 10px; border-top: 1px solid #333;
  }
  .task-card .dates .expired { color: #ff4444; }
  .task-card .dates .active  { color: #00ff41; }
  .task-card .dates .frozen  { color: #22d3ee; }

  /* Индикатор языка на карточке */
  .lang-indicator {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    color: #3b82f6;
    font-weight: 600;
    background: rgba(59, 130, 246, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Кнопка удаления на карточке */
  .delete-btn-card {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: #ef4444;
    color: #fff;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    opacity: 0.7;
  }
  .delete-btn-card:hover {
    background: #dc2626;
    opacity: 1;
    transform: scale(1.1);
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
  }

  /* ===== МОДАЛКА ===== */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #1a1a1a; border-radius: 12px; padding: 32px;
    max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
    position: relative; border: 1px solid #00ff41;
  }
  .modal-close {
    position: absolute; top: 15px; right: 20px; background: none;
    border: none; color: #a3a3a3; font-size: 28px; cursor: pointer;
  }
  .modal-close:hover { color: #00ff41; }
  .modal h3 { margin-bottom: 16px; font-size: 24px; padding-right: 40px; color: #00ff41; }
  .modal .meta { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .modal .content {
    background: #0a0a0a; padding: 20px; border-radius: 8px;
    line-height: 1.7; white-space: pre-wrap; word-wrap: break-word;
    border: 1px solid #333; color: #e5e5e5;
  }
  .modal .dates-full {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid #333;
    font-size: 14px; color: #a3a3a3; line-height: 1.8;
  }

  /* ===== КНОПКИ ДЕЙСТВИЙ АДМИНА ===== */
  .admin-actions {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid #333;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .admin-actions button {
    padding: 10px 18px; border: none; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 14px;
    transition: 0.2s;
  }
  .btn-freeze   { background: #06b6d4; color: #fff; }
  .btn-freeze:hover { background: #0891b2; box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }
  .btn-unfreeze { background: #8b5cf6; color: #fff; }
  .btn-unfreeze:hover { background: #7c3aed; box-shadow: 0 0 10px rgba(139, 92, 246, 0.4); }
  .btn-close-task { background: #ef4444; color: #fff; }
  .btn-close-task:hover { background: #dc2626; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
  .btn-reopen   { background: #00ff41; color: #0a0a0a; }
  .btn-reopen:hover { background: #00cc33; box-shadow: 0 0 10px rgba(0, 255, 65, 0.4); }
  .btn-delete   { background: #dc2626; color: #fff; }
  .btn-delete:hover { background: #b91c1c; box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }

  .empty {
    text-align: center; padding: 60px 20px; color: #666;
    grid-column: 1 / -1;
  }
  .empty h4 { font-size: 20px; margin-bottom: 8px; color: #00ff41; }
</style>
</head>
<body>

<!-- ===== ЭКРАН ВХОДА ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>CORE TEST</h1>
    <p class="sub">Система заданий для тестировщиков</p>
    <input type="text" id="loginUser" placeholder="Логин" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Пароль">
    <button onclick="doLogin()">Войти</button>
    <div class="error" id="loginError"></div>
    <div class="hint">
      <b>Тестовые аккаунты:</b><br>
      👑 Админ: <code>admin</code> / <code>admin123</code><br>
      👤 Тестер: <code>tester1</code> / <code>test123</code><br>
      👤 Тестер: <code>tester2</code> / <code>test456</code>
    </div>
  </div>
</div>

<!-- ===== ГЛАВНОЕ ПРИЛОЖЕНИЕ ===== -->
<div class="app" id="app">
  <header>
    <h2>CORE TEST</h2>
    <div class="header-controls">
      <button class="lang-toggle" id="langToggle" onclick="toggleAllTranslation()">
        <span class="flag">🇷🇺</span>
        <span id="langText">RU</span>
      </button>
      <div class="user-info">
        <span id="userLabel"></span>
        <button class="btn-logout" onclick="doLogout()">Выйти</button>
      </div>
    </div>
  </header>

  <main>
    <!-- Админ-панель -->
    <div class="admin-panel" id="adminPanel" style="display:none;">
      <h3>⚙️ Панель администратора — создать задание</h3>
      <input type="text" id="taskTitle" placeholder="Заголовок задания">
      <textarea id="taskBody" placeholder="Текст задания (скопируйте сюда)..."></textarea>
      <div class="admin-row">
        <select id="taskPriority">
          <option value="standard">📘 Стандарт</option>
          <option value="important">🔥 Важное</option>
        </select>
        <input type="date" id="taskStart">
        <input type="date" id="taskEnd">
      </div>
      <button class="btn-publish" onclick="publishTask()">📢 Опубликовать на доску</button>
    </div>

    <!-- Доска -->
    <div class="board-header">
      <h3>📋 Доска заданий</h3>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
        <button class="filter-btn" onclick="setFilter('important', this)">🔥 Важные</button>
        <button class="filter-btn" onclick="setFilter('active', this)">✅ Активные</button>
        <button class="filter-btn" onclick="setFilter('frozen', this)">❄️ Замороженные</button>
        <button class="filter-btn" onclick="setFilter('closed', this)">🔒 Закрытые</button>
      </div>
    </div>
    <div class="board" id="board"></div>
  </main>
</div>

<!-- ===== МОДАЛКА ЗАДАНИЯ ===== -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3 id="modalTitle"></h3>
    <div class="meta" id="modalMeta"></div>
    <div class="content" id="modalContent"></div>
    <div class="dates-full" id="modalDates"></div>
    <div class="admin-actions" id="adminActions" style="display:none;"></div>
  </div>
</div>

<script>
// ===== БАЗА ДАННЫХ =====
const DB = {
  getUsers() {
    if (!localStorage.getItem('users')) {
      localStorage.setItem('users', JSON.stringify({
        admin:   { pass: 'admin123', role: 'admin',  name: 'Администратор' },
        tester1: { pass: 'test123',  role: 'tester', name: 'Тестер #1' },
        tester2: { pass: 'test456',  role: 'tester', name: 'Тестер #2' }
      }));
    }
    return JSON.parse(localStorage.getItem('users'));
  },
  getTasks() {
    if (!localStorage.getItem('tasks')) {
      const today = new Date();
      const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const fmt = d => d.toISOString().split('T')[0];
      const demo = [
        {
          id: 1, title: '🔥 Критический баг в корзине',
          body: 'Проверить оформление заказа при пустой корзине.\n\nШаги:\n1. Открыть главную\n2. Перейти в корзину\n3. Нажать "Оформить"\n\nОжидаемый результат: сообщение об ошибке\nФактический: краш приложения',
          priority: 'important',
          start: fmt(today), end: fmt(tomorrow),
          author: 'admin', created: Date.now(),
          frozen: false, manuallyClosed: false,
          translatedTitle: '', translatedBody: ''
        },
        {
          id: 2, title: 'Проверить форму регистрации',
          body: 'Протестировать все поля формы регистрации:\n- Email\n- Пароль (мин. 8 символов)\n- Подтверждение пароля\n\nПроверить валидацию и сообщения об ошибках.',
          priority: 'standard',
          start: fmt(today), end: fmt(tomorrow),
          author: 'admin', created: Date.now() - 1000,
          frozen: false, manuallyClosed: false,
          translatedTitle: '', translatedBody: ''
        },
        {
          id: 3, title: '❄️ Замороженная задача (пример)',
          body: 'Эта задача заморожена админом — срок не тикает, пока не разморозят.',
          priority: 'standard',
          start: fmt(today), end: fmt(tomorrow),
          author: 'admin', created: Date.now() - 2000,
          frozen: true, manuallyClosed: false,
          translatedTitle: '', translatedBody: ''
        },
        {
          id: 4, title: 'Старая задача (закрыта)',
          body: 'Эта задача уже просрочена — автоматически закрыта.',
          priority: 'standard',
          start: fmt(yesterday), end: fmt(yesterday),
          author: 'admin', created: Date.now() - 3000,
          frozen: false, manuallyClosed: false,
          translatedTitle: '', translatedBody: ''
        }
      ];
      localStorage.setItem('tasks', JSON.stringify(demo));
    }
    return JSON.parse(localStorage.getItem('tasks'));
  },
  saveTasks(t) { localStorage.setItem('tasks', JSON.stringify(t)); }
};

// ===== СОСТОЯНИЕ =====
let currentUser = null;
let currentFilter = 'all';
let currentTaskId = null;
let globalLang = 'ru'; // 'ru' или 'en'

// ===== API ПЕРЕВОДА =====
async function translateText(text, from = 'ru', to = 'en') {
  try {
    const response = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`
    );
    const data = await response.json();
    if (data.responseStatus === 200 && data.responseData?.translatedText) {
      return data.responseData.translatedText;
    }
    return text;
  } catch (error) {
    console.error('Ошибка перевода:', error);
    throw error;
  }
}

// ===== ГЛОБАЛЬНЫЙ ПЕРЕВОД ВСЕХ ЗАДАНИЙ =====
async function toggleAllTranslation() {
  const btn = document.getElementById('langToggle');
  const langText = document.getElementById('langText');
  const flag = btn.querySelector('.flag');
  
  if (globalLang === 'en') {
    // Переключаем на русский
    globalLang = 'ru';
    btn.innerHTML = '<span class="flag">🇷🇺</span><span id="langText">RU</span>';
    btn.classList.remove('translating');
    renderBoard();
    if (currentTaskId) openTask(currentTaskId);
    return;
  }

  // Переключаем на английский
  btn.classList.add('translating');
  btn.innerHTML = '<span class="flag">⏳</span><span id="langText">Loading...</span>';
  
  const tasks = DB.getTasks();
  let translatedCount = 0;
  const totalToTranslate = tasks.filter(t => !t.translatedTitle).length;

  try {
    // Переводим все задачи которые ещё не переведены
    for (const task of tasks) {
      if (!task.translatedTitle || !task.translatedBody) {
        try {
          const [transTitle, transBody] = await Promise.all([
            translateText(task.title, 'ru', 'en'),
            translateText(task.body, 'ru', 'en')
          ]);
          task.translatedTitle = transTitle;
          task.translatedBody = transBody;
          translatedCount++;
        } catch (e) {
          console.error(`Не удалось перевести задачу ${task.id}:`, e);
        }
      }
    }

    DB.saveTasks(tasks);
    
    // Включаем английский режим
    globalLang = 'en';
    btn.innerHTML = '<span class="flag">🇬🇧</span><span id="langText">EN</span>';
    btn.classList.remove('translating');
    
    // Перерисовываем доску и модалку
    renderBoard();
    if (currentTaskId) openTask(currentTaskId);
    
    // Показываем уведомление
    if (translatedCount > 0) {
      console.log(`Переведено задач: ${translatedCount}`);
    }
  } catch (e) {
    console.error('Ошибка при массовом переводе:', e);
    btn.innerHTML = '<span class="flag">🇷🇺</span><span id="langText">RU</span>';
    btn.classList.remove('translating');
    alert('⚠️ Ошибка при переводе. Проверьте подключение к интернету.');
  }
}

// ===== УДАЛЕНИЕ ЗАДАЧИ =====
function deleteTask(id) {
  const confirmText = globalLang === 'en' 
    ? 'Are you sure you want to delete this task? This action cannot be undone.'
    : 'Вы уверены, что хотите удалить эту задачу? Это действие нельзя отменить.';
  
  if (!confirm(confirmText)) return;
  
  const tasks = DB.getTasks();
  const filteredTasks = tasks.filter(t => t.id !== id);
  DB.saveTasks(filteredTasks);
  
  closeModal();
  renderBoard();
}

// ===== АВТОРИЗАЦИЯ =====
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  const users = DB.getUsers();

  if (!users[u] || users[u].pass !== p) {
    err.textContent = '❌ Неверный логин или пароль';
    return;
  }
  currentUser = { username: u, ...users[u] };
  sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
  err.textContent = '';
  showApp();
}

function doLogout() {
  sessionStorage.removeItem('currentUser');
  currentUser = null;
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('userLabel').textContent =
    (currentUser.role === 'admin' ? '👑 ' : '👤 ') + currentUser.name;

  document.getElementById('adminPanel').style.display =
    currentUser.role === 'admin' ? 'block' : 'none';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('taskStart').value = today;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  document.getElementById('taskEnd').value = tomorrow.toISOString().split('T')[0];

  renderBoard();
}

// ===== ПУБЛИКАЦИЯ =====
function publishTask() {
  if (currentUser.role !== 'admin') return;
  const title = document.getElementById('taskTitle').value.trim();
  const body  = document.getElementById('taskBody').value.trim();
  const priority = document.getElementById('taskPriority').value;
  const start = document.getElementById('taskStart').value;
  const end   = document.getElementById('taskEnd').value;

  if (!title || !body || !start || !end) { alert('⚠️ Заполни все поля!'); return; }
  if (end < start) { alert('⚠️ Дата окончания раньше начала!'); return; }

  const tasks = DB.getTasks();
  tasks.push({
    id: Date.now(), title, body, priority, start, end,
    author: currentUser.username, created: Date.now(),
    frozen: false, manuallyClosed: false,
    translatedTitle: '', translatedBody: ''
  });
  DB.saveTasks(tasks);

  document.getElementById('taskTitle').value = '';
  document.getElementById('taskBody').value = '';
  alert('✅ Задание опубликовано!');
  renderBoard();
}

// ===== СТАТУС ЗАДАЧИ =====
function getTaskStatus(task) {
  if (task.frozen) return 'frozen';
  if (task.manuallyClosed) return 'closed';
  const today = new Date().toISOString().split('T')[0];
  if (today < task.start) return 'future';
  if (today > task.end)   return 'closed';
  return 'active';
}

// ===== ФИЛЬТРЫ =====
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBoard();
}

// ===== РЕНДЕР ДОСКИ =====
function renderBoard() {
  const board = document.getElementById('board');
  let tasks = DB.getTasks().map(t => ({ ...t, status: getTaskStatus(t) }));

  if (currentFilter === 'important') tasks = tasks.filter(t => t.priority === 'important' && t.status !== 'closed');
  if (currentFilter === 'active')    tasks = tasks.filter(t => t.status === 'active' || t.status === 'future');
  if (currentFilter === 'frozen')    tasks = tasks.filter(t => t.status === 'frozen');
  if (currentFilter === 'closed')    tasks = tasks.filter(t => t.status === 'closed');

  tasks.sort((a, b) => {
    const order = { active: 0, future: 1, frozen: 2, closed: 3 };
    const priOrder = { important: 0, standard: 1 };
    const sa = order[a.status], sb = order[b.status];
    if (sa !== sb) return sa - sb;
    if (priOrder[a.priority] !== priOrder[b.priority])
      return priOrder[a.priority] - priOrder[b.priority];
    return b.created - a.created;
  });

  if (tasks.length === 0) {
    const emptyText = globalLang === 'en' 
      ? '<div class="empty"><h4>📭 No tasks</h4><p>Board is empty for now.</p></div>'
      : '<div class="empty"><h4>📭 Заданий нет</h4><p>Пока здесь пусто.</p></div>';
    board.innerHTML = emptyText;
    return;
  }

  board.innerHTML = tasks.map(t => {
    const cardClass = t.status === 'frozen' ? 'frozen'
                    : t.status === 'closed' ? 'closed'
                    : t.priority;

    // Выбираем текст в зависимости от языка
    const title = (globalLang === 'en' && t.translatedTitle) ? t.translatedTitle : t.title;
    const preview = (globalLang === 'en' && t.translatedBody) 
      ? t.translatedBody.substring(0, 100) + (t.translatedBody.length > 100 ? '...' : '')
      : t.body.substring(0, 100) + (t.body.length > 100 ? '...' : '');

    let badges = '';
    const badgeClosed = globalLang === 'en' ? '🔒 Closed' : '🔒 Закрыто';
    const badgeFrozen = globalLang === 'en' ? '❄️ Frozen' : '❄️ Заморожено';
    const badgeImportant = globalLang === 'en' ? '🔥 Important' : '🔥 Важное';
    const badgeStandard = globalLang === 'en' ? '📘 Standard' : '📘 Стандарт';

    if (t.status === 'frozen')       badges += `<span class="task-badge badge-frozen">${badgeFrozen}</span>`;
    else if (t.status === 'closed')  badges += `<span class="task-badge badge-closed">${badgeClosed}</span>`;
    if (t.priority === 'important' && t.status !== 'closed')
      badges += `<span class="task-badge badge-important">${badgeImportant}</span>`;
    else if (t.status !== 'frozen' && t.status !== 'closed')
      badges += `<span class="task-badge badge-standard">${badgeStandard}</span>`;

    const statusClass = t.status === 'closed' ? 'expired'
                      : t.status === 'frozen' ? 'frozen'
                      : 'active';
    
    const statusText = globalLang === 'en'
      ? (t.status === 'closed' ? 'Closed'
        : t.status === 'frozen' ? 'On Hold'
        : t.status === 'future' ? 'Not Started'
        : 'Active')
      : (t.status === 'closed' ? 'Закрыто'
        : t.status === 'frozen' ? 'На паузе'
        : t.status === 'future' ? 'Ещё не начато'
        : 'Активно');

    const langIndicator = globalLang === 'en' && t.translatedTitle 
      ? '<span class="lang-indicator">🇬🇧 EN</span>' 
      : '';

    // Кнопка удаления (только для админа и только для закрытых задач)
    const deleteBtn = (currentUser && currentUser.role === 'admin' && t.status === 'closed')
      ? `<button class="delete-btn-card" onclick="event.stopPropagation(); deleteTask(${t.id})" title="${globalLang === 'en' ? 'Delete' : 'Удалить'}">🗑️</button>`
      : '';

    return `
      <div class="task-card ${cardClass}" onclick="openTask(${t.id})">
        ${langIndicator}
        ${badges}
        <h4>${escapeHtml(title)}</h4>
        <div class="preview">${escapeHtml(preview)}</div>
        <div class="dates">
          <span>📅 ${t.start} → ${t.end}</span>
          <span class="${statusClass}">${statusText}</span>
        </div>
        ${deleteBtn}
      </div>
    `;
  }).join('');
}

// ===== МОДАЛКА =====
function openTask(id) {
  currentTaskId = id;
  
  const t = DB.getTasks().find(x => x.id === id);
  if (!t) return;
  const status = getTaskStatus(t);

  // Выбираем текст в зависимости от языка
  const title = (globalLang === 'en' && t.translatedTitle) ? t.translatedTitle : t.title;
  const content = (globalLang === 'en' && t.translatedBody) ? t.translatedBody : t.body;

  document.getElementById('modalTitle').textContent = title;

  let badges = '';
  const badgeClosed = globalLang === 'en' ? '🔒 Closed' : '🔒 Закрыто';
  const badgeFrozen = globalLang === 'en' ? '❄️ Frozen' : '❄️ Заморожено';
  const badgeImportant = globalLang === 'en' ? '🔥 Important' : '🔥 Важное';
  const badgeStandard = globalLang === 'en' ? '📘 Standard' : '📘 Стандарт';

  if (status === 'frozen')       badges += `<span class="task-badge badge-frozen">${badgeFrozen}</span>`;
  else if (status === 'closed')  badges += `<span class="task-badge badge-closed">${badgeClosed}</span>`;
  if (t.priority === 'important' && status !== 'closed')
    badges += `<span class="task-badge badge-important">${badgeImportant}</span>`;
  else if (status !== 'frozen' && status !== 'closed')
    badges += `<span class="task-badge badge-standard">${badgeStandard}</span>`;
  document.getElementById('modalMeta').innerHTML = badges;

  document.getElementById('modalContent').textContent = content;

  const statusText = globalLang === 'en'
    ? (status === 'closed'  ? '❌ Closed'
       : status === 'frozen'  ? '❄️ Frozen (deadline paused)'
       : status === 'future'  ? '⏳ Not started yet'
       : '✅ Active')
    : (status === 'closed'  ? '❌ Закрыто'
       : status === 'frozen'  ? '❄️ Заморожено (срок на паузе)'
       : status === 'future'  ? '⏳ Ещё не началось'
       : '✅ Активно');

  const periodText = globalLang === 'en' ? 'Period' : 'Период';
  const statusLabel = globalLang === 'en' ? 'Status' : 'Статус';
  const createdBy = globalLang === 'en' ? 'Created by' : 'Создал';

  document.getElementById('modalDates').innerHTML =
    `<b>${periodText}:</b> ${t.start} → ${t.end}<br>
     <b>${statusLabel}:</b> ${statusText}<br>
     <b>${createdBy}:</b> ${t.author}`;

  const actions = document.getElementById('adminActions');
  if (currentUser && currentUser.role === 'admin') {
    const btnUnfreeze = globalLang === 'en' ? '🔓 Unfreeze' : '🔓 Разморозить';
    const btnClose = globalLang === 'en' ? '🔒 Close' : '🔒 Закрыть';
    const btnReopen = globalLang === 'en' ? '🔓 Reopen' : '🔓 Переоткрыть';
    const btnFreeze = globalLang === 'en' ? '❄️ Freeze' : '❄️ Заморозить';
    const btnDelete = globalLang === 'en' ? '🗑️ Delete' : '🗑️ Удалить';

    let btns = '';
    if (status === 'frozen') {
      btns += `<button class="btn-unfreeze" onclick="toggleFreeze(${t.id})">${btnUnfreeze}</button>`;
      btns += `<button class="btn-close-task" onclick="manualClose(${t.id})">${btnClose}</button>`;
    } else if (status === 'closed') {
      btns += `<button class="btn-reopen" onclick="reopenTask(${t.id})">${btnReopen}</button>`;
      btns += `<button class="btn-freeze" onclick="toggleFreeze(${t.id})">${btnFreeze}</button>`;
      btns += `<button class="btn-delete" onclick="deleteTask(${t.id})">${btnDelete}</button>`;
    } else {
      btns += `<button class="btn-freeze" onclick="toggleFreeze(${t.id})">${btnFreeze}</button>`;
      btns += `<button class="btn-close-task" onclick="manualClose(${t.id})">${btnClose}</button>`;
    }
    actions.innerHTML = btns;
    actions.style.display = 'flex';
  } else {
    actions.style.display = 'none';
  }

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentTaskId = null;
}

// ===== ДЕЙСТВИЯ АДМИНА =====
function toggleFreeze(id) {
  const tasks = DB.getTasks();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.frozen = !t.frozen;
  if (t.frozen) t.manuallyClosed = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

function manualClose(id) {
  const confirmText = globalLang === 'en' ? 'Close this task?' : 'Закрыть задачу?';
  if (!confirm(confirmText)) return;
  const tasks = DB.getTasks();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.manuallyClosed = true;
  t.frozen = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

function reopenTask(id) {
  const tasks = DB.getTasks();
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.manuallyClosed = false;
  t.frozen = false;
  DB.saveTasks(tasks);
  openTask(id);
  renderBoard();
}

// ===== УТИЛИТЫ =====
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('loginPass').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});

const saved = sessionStorage.getItem('currentUser');
if (saved) { currentUser = JSON.parse(saved); showApp(); }

setInterval(() => { if (currentUser) renderBoard(); }, 60000);
</script>
